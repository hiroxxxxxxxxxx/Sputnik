# 銘柄別・因子別しきい値。起動時に Avionics/Factory が読み込み、各因子へ注入する。
# 定義書「0-1-Ⅵ 自己改造禁止」「4-2-1 計器」参照。ロジックと戦略パラメータの分離。
# ※時刻・データ遅延は config/schedule.toml で管理。
# 高度レジーム: high（高高度・利下げ）/ mid（中高度・安定期）/ low（低高度・利上げ）

[U]
C2_on = 0.50
C2_off = 0.43
C1_on = 0.40
C1_off = 0.36

[T]
confirm_days = 2

[S]
# 発動判定: 小数点第二位切上げ（ceil）
# 復帰判定: 小数点第二位切捨て（floor）
S2_on = 1.3
S2_off = 1.3
S1_on = 1.1
S1_off = 1.1

[NQ.P]
P2_daily_max = -0.03
P2_cum2_max = -0.05
P2_gap_trend = -0.05
P1_daily_lo = -0.03
P1_daily_hi = -0.015
P1_cum5_lo = -0.06
P1_cum5_hi = -0.03
P1_gap_lo = -0.05
P1_gap_hi = -0.03
P0_daily_abs = 0.015
P0_cum5_min = -0.03
P0_gap_min = -0.03
confirm_days = 1

[NQ.V.high]
V2_on = 40.0
V2_off = 38.0
V2_confirm_days = 2
V1_on = 30.0
V1_off = 28.0
V1_confirm_days = 1

[NQ.V.mid]
V2_on = 40.0
V2_off = 38.0
V2_confirm_days = 2
V1_on = 30.0
V1_off = 28.0
V1_confirm_days = 1

[NQ.V.low]
V2_on = 35.0
V2_off = 33.0
V2_confirm_days = 2
V1_on = 25.0
V1_off = 23.0
V1_confirm_days = 1

[NQ.C]
# C2発動（即）: SMA20下回り OR 前日比-2.5%以上。C0復帰は2日確認。
daily_change_C2 = -0.025
confirm_days = 2

[GC.P]
P2_daily_max = -0.03
P2_cum2_max = -0.05
P2_gap_trend = -0.04
P1_daily_lo = -0.03
P1_daily_hi = -0.015
P1_cum5_lo = -0.06
P1_cum5_hi = -0.03
P1_gap_lo = -0.04
P1_gap_hi = -0.025
P0_daily_abs = 0.015
P0_cum5_min = -0.03
P0_gap_min = -0.025
confirm_days = 1

[GC.V.high]
V2_on = 40.0
V2_off = 38.0
V2_confirm_days = 2
V1_on = 30.0
V1_off = 28.0
V1_confirm_days = 1

[GC.V.mid]
V2_on = 40.0
V2_off = 38.0
V2_confirm_days = 2
V1_on = 30.0
V1_off = 28.0
V1_confirm_days = 1

[GC.V.low]
V2_on = 35.0
V2_off = 33.0
V2_confirm_days = 2
V1_on = 25.0
V1_off = 23.0
V1_confirm_days = 1

[GC.R]
# R2発動（即）: 高値比 高高度▲2.5%超 / 中高度▲2.5%超 / 低高度▲1.5%超。R0復帰は2日確認。
drawdown_high_L2 = -0.025
drawdown_mid_L2 = -0.025
drawdown_low_L2 = -0.015
drawdown_high_L0 = -0.015
drawdown_mid_L0 = -0.015
drawdown_low_L0 = -0.005
confirm_days = 2
